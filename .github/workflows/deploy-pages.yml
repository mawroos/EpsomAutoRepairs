# GitHub Actions workflow to build and deploy static content to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          HCAPTCHA_SITE_KEY: ${{ secrets.HCAPTCHA_SITE_KEY }}
        run: |
          if [ -z "$WEB3FORMS_ACCESS_KEY" ] || [ -z "$HCAPTCHA_SITE_KEY" ]; then
            echo "::error::Missing required secrets. Add WEB3FORMS_ACCESS_KEY and HCAPTCHA_SITE_KEY in Settings > Secrets > Actions."
            exit 1
          fi
          sed -i "s/YOUR_ACCESS_KEY_HERE/$WEB3FORMS_ACCESS_KEY/g" js/contact-form-handler.js
          sed -i "s/YOUR_HCAPTCHA_SITE_KEY/$HCAPTCHA_SITE_KEY/g" index.html
          sed -i "s/YOUR_HCAPTCHA_SITE_KEY/$HCAPTCHA_SITE_KEY/g" ajax-load/modal-contact-form.html
          sed -i "s/YOUR_HCAPTCHA_SITE_KEY/$HCAPTCHA_SITE_KEY/g" ajax-load/reservation-form.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload static site from root directory
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
